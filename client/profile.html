<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — StockSmart Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #5b5af7; --primary-hover: #4a49e0; --secondary: #0ea5e9;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg-base: #0a0a1a; --bg-elevated: #12122a; --bg-card: rgba(18, 18, 42, 0.7);
            --border-subtle: rgba(255, 255, 255, 0.06); --border-medium: rgba(255, 255, 255, 0.1);
            --text-primary: #f1f1f6; --text-secondary: #8b8ba6; --text-muted: #6b6b80;
            --radius-sm: 10px; --radius-md: 14px; --radius-lg: 20px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-base); color: var(--text-primary);
            min-height: 100vh; -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 30% 40%, rgba(91,90,247,0.06) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .top-nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(18,18,42,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 14px 28px; display: flex; align-items: center; gap: 16px;
        }
        .back-btn {
            background: none; border: 1px solid var(--border-medium); color: var(--text-secondary);
            padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer;
            font-size: 13px; font-family: inherit; transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
        .page-title { font-size: 20px; font-weight: 700; }
        .container { max-width: 800px; margin: 0 auto; padding: 28px; position: relative; z-index: 1; }
        .profile-card {
            background: var(--bg-card); backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 36px;
            margin-bottom: 20px;
        }
        .profile-header {
            display: flex; align-items: center; gap: 20px; margin-bottom: 28px;
            padding-bottom: 24px; border-bottom: 1px solid var(--border-subtle);
        }
        .avatar-lg {
            width: 72px; height: 72px; border-radius: var(--radius-md);
            background: linear-gradient(135deg,var(--primary),var(--secondary));
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; font-weight: 700; color: white; flex-shrink: 0;
        }
        .profile-name { font-size: 22px; font-weight: 700; }
        .profile-email { font-size: 14px; color: var(--text-muted); }
        .profile-plan { margin-top: 6px; }
        .plan-badge {
            display: inline-block; padding: 4px 12px; border-radius: 100px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
        }
        .plan-trial { background: rgba(245,158,11,0.15); color: var(--warning); }
        .plan-premium { background: rgba(91,90,247,0.15); color: var(--primary); }
        .plan-enterprise { background: rgba(14,165,233,0.15); color: var(--secondary); }
        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 6px; }
        .form-input {
            width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
            color: var(--text-primary); font-size: 13px; font-family: inherit;
        }
        .form-input:focus { outline: none; border-color: var(--primary); }
        .form-input:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
            border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer;
            border: none; font-family: inherit; transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg,var(--primary),#7c3aed); color: white; }
        .btn-primary:hover { transform: translateY(-1px); }
        .btn-danger { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
        .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-medium); }
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid var(--border-subtle);
        }
        .info-label { font-size: 13px; color: var(--text-muted); }
        .info-value { font-size: 14px; font-weight: 500; text-align: right; }
        .toast { position: fixed; bottom: 28px; right: 28px; background: var(--bg-elevated); border: 1px solid var(--border-medium); padding: 14px 22px; border-radius: var(--radius-sm); z-index: 2000; font-size: 13px; animation: toastIn 0.3s ease; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .container { padding: 16px; } .profile-header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
    <nav class="top-nav">
        <button class="back-btn" onclick="window.location.href='dashboard.html'">← Dashboard</button>
        <h1 class="page-title">My Profile</h1>
    </nav>

    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-lg" id="profileAvatar">U</div>
                <div>
                    <div class="profile-name" id="profileName">Loading...</div>
                    <div class="profile-email" id="profileEmail">loading@email.com</div>
                    <div class="profile-plan"><span class="plan-badge plan-trial" id="profilePlan">Trial</span></div>
                </div>
            </div>

            <h3 class="section-title">Personal Information</h3>
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="editName" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="editEmail" disabled>
            </div>
            <button class="btn btn-primary" onclick="updateProfile()">💾 Save Changes</button>
        </div>

        <div class="profile-card">
            <h3 class="section-title">Change Password</h3>
            <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-input" id="currentPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" id="newPassword" placeholder="Min. 8 characters">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-input" id="confirmPassword" placeholder="Re-enter new password">
            </div>
            <button class="btn btn-primary" onclick="changePassword()">🔒 Update Password</button>
        </div>

        <div class="profile-card">
            <h3 class="section-title">Account Details</h3>
            <div class="info-row">
                <span class="info-label">Member Since</span>
                <span class="info-value" id="memberSince">Loading...</span>
            </div>
            <div class="info-row">
                <span class="info-label">Total Shops</span>
                <span class="info-value" id="totalShopsInfo">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">Account Status</span>
                <span class="info-value" style="color:var(--success);">Active</span>
            </div>
        </div>

        <div class="profile-card" style="border-color:rgba(239,68,68,0.2);">
            <h3 class="section-title" style="color:var(--danger);">Danger Zone</h3>
            <p style="font-size:12px;color:var(--text-muted);margin-bottom:16px;">Permanently delete your account and all associated data. This action cannot be undone.</p>
            <button class="btn btn-danger" onclick="deleteAccount()">🗑 Delete My Account</button>
        </div>
    </div>

    <script src="../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let userProfile = null;

        auth.onAuthStateChanged((user) => {
            if (!user) { window.location.href = '../index.html'; return; }
            currentUser = user;
            loadProfile();
        });

        function loadProfile() {
            db.collection('users').doc(currentUser.uid).get().then((doc) => {
                if (doc.exists) {
                    userProfile = doc.data();
                    document.getElementById('profileName').textContent = userProfile.name || 'User';
                    document.getElementById('profileEmail').textContent = userProfile.email || '';
                    document.getElementById('profileAvatar').textContent = (userProfile.name || 'U').charAt(0).toUpperCase();
                    document.getElementById('editName').value = userProfile.name || '';
                    document.getElementById('editEmail').value = userProfile.email || '';
                    
                    const plan = userProfile.plan || 'trial';
                    const planBadge = document.getElementById('profilePlan');
                    planBadge.textContent = plan.charAt(0).toUpperCase() + plan.slice(1);
                    planBadge.className = `plan-badge plan-${plan}`;
                    
                    document.getElementById('memberSince').textContent = userProfile.createdAt 
                        ? new Date(userProfile.createdAt.toDate()).toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'})
                        : 'N/A';
                }
            });

            db.collection('shops').where('userId', '==', currentUser.uid).get().then(snap => {
                document.getElementById('totalShopsInfo').textContent = snap.size;
            });
        }

        function updateProfile() {
            const name = document.getElementById('editName').value.trim();
            if (!name) { showToast('Name is required', 'error'); return; }
            
            db.collection('users').doc(currentUser.uid).update({ name })
                .then(() => {
                    document.getElementById('profileName').textContent = name;
                    document.getElementById('profileAvatar').textContent = name.charAt(0).toUpperCase();
                    showToast('Profile updated!', 'success');
                })
                .catch(err => showToast(err.message, 'error'));
        }

        function changePassword() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!current || !newPass || !confirm) { showToast('All fields required', 'error'); return; }
            if (newPass.length < 8) { showToast('Password must be 8+ characters', 'error'); return; }
            if (newPass !== confirm) { showToast('Passwords do not match', 'error'); return; }

            const credential = firebase.auth.EmailAuthProvider.credential(currentUser.email, current);
            currentUser.reauthenticateWithCredential(credential)
                .then(() => currentUser.updatePassword(newPass))
                .then(() => {
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                    showToast('Password updated!', 'success');
                })
                .catch(err => showToast(err.message, 'error'));
        }

        function deleteAccount() {
            if (!confirm('DELETE your account and ALL data? Type DELETE to confirm.')) return;
            const input = prompt('Type DELETE to confirm:');
            if (input !== 'DELETE') return;
            
            db.collection('shops').where('userId', '==', currentUser.uid).get()
                .then(snap => { const batch = db.batch(); snap.forEach(d => batch.delete(d.ref)); return batch.commit(); })
                .then(() => db.collection('users').doc(currentUser.uid).delete())
                .then(() => currentUser.delete())
                .then(() => { window.location.href = '../index.html'; })
                .catch(err => showToast(err.message, 'error'));
        }

        function showToast(m, t='info') {
            const e = document.querySelector('.toast'); if(e) e.remove();
            const d = document.createElement('div'); d.className = 'toast';
            d.innerHTML = `<span>${t==='success'?'✅':t==='error'?'❌':'ℹ️'}</span> ${m}`;
            document.body.appendChild(d);
            setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity 0.3s';setTimeout(()=>d.remove(),300);},3000);
        }
    </script>
</body>
</html>
